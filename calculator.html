<!DOCTYPE html>
<html>
<head>
    <title>Calculator - Meseret</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
        }
        .calculator {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 350px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        #display {
            width: 100%;
            height: 60px;
            font-size: 28px;
            text-align: right;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 20px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #f0f2f5;
            transition: 0.3s;
        }
        button:hover {
            background: #e0e2e5;
        }
        .operator {
            background: #667eea;
            color: white;
        }
        .operator:hover {
            background: #5a67d8;
        }
        .equals {
            background: #48bb78;
            color: white;
        }
        .equals:hover {
            background: #38a169;
        }
        .clear {
            background: #f56565;
            color: white;
        }
        .clear:hover {
            background: #e53e3e;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div>
        <div class="calculator">
            <h2>Simple Calculator</h2>
            <input type="text" id="display" readonly>
            <div class="buttons">
                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('8')">8</button>
                <button onclick="appendNumber('9')">9</button>
                <button class="operator" onclick="setOperator('+')">+</button>
                
                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('5')">5</button>
                <button onclick="appendNumber('6')">6</button>
                <button class="operator" onclick="setOperator('-')">-</button>
                
                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('2')">2</button>
                <button onclick="appendNumber('3')">3</button>
                <button class="operator" onclick="setOperator('*')">×</button>
                
                <button onclick="appendNumber('0')">0</button>
                <button onclick="appendNumber('.')">.</button>
                <button class="equals" onclick="calculate()">=</button>
                <button class="operator" onclick="setOperator('/')">÷</button>
                
                <button class="clear" onclick="clearDisplay()">C</button>
            </div>
        </div>
        <div class="back-link">
            <a href="https://meseretendale952-png.github.io/Portfolio">← Back to Portfolio</a>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentNumber = '';
        let previousNumber = '';
        let operation = null;

        function appendNumber(num) {
            currentNumber += num;
            display.value = currentNumber;
        }

        function setOperator(op) {
            if (currentNumber === '') return;
            if (previousNumber !== '') calculate();
            operation = op;
            previousNumber = currentNumber;
            currentNumber = '';
        }

        function calculate() {
            if (previousNumber === '' || currentNumber === '' || operation === null) return;
            
            let result;
            let prev = parseFloat(previousNumber);
            let curr = parseFloat(currentNumber);
            
            switch(operation) {
                case '+': result = prev + curr; break;
                case '-': result = prev - curr; break;
                case '*': result = prev * curr; break;
                case '/': result = prev / curr; break;
                default: return;
            }
            
            display.value = result;
            currentNumber = result.toString();
            previousNumber = '';
            operation = null;
        }

        function clearDisplay() {
            currentNumber = '';
            previousNumber = '';
            operation = null;
            display.value = '';
        }
    </script>
</body>
</html>
